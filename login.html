<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - War Thunder Коллекция</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">War Thunder Коллекция</div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="stats.html">Статистика</a></li>
                <li><a href="map.html">Карта</a></li>
                <li><a href="favorites.html">Избранное</a></li>
                <li><a href="compare.html">Сравнение</a></li>
                <li><a href="admin.html">Админ-панель</a></li>
                <li><a href="login.html">Войти</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" id="login-tab">Вход</button>
                <button class="tab-btn" id="register-tab">Регистрация</button>
            </div>
            <div class="auth-form" id="login-form">
                <h2>Вход</h2>
                <form id="login-form-element">
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn">Войти</button>
                </form>
            </div>
            <div class="auth-form" id="register-form" style="display:none;">
                <h2>Регистрация</h2>
                <form id="register-form-element">
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <button type="submit" class="btn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </main>
    <footer>War Thunder Коллекция © 2026</footer>
    <script src="auth.js"></script>
</body>
</html>
